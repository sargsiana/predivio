<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0c" />
  <meta name="description" content="PREDIVIO — coming soon." />
  <title>PREDIVIO — Coming soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html {
      height: 100%;
      background: #0a0a0c;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top, 0px) + 16px)
               max(24px, env(safe-area-inset-right, 0px) + 16px)
               max(24px, env(safe-area-inset-bottom, 0px) + 16px)
               max(24px, env(safe-area-inset-left, 0px) + 16px);
      font-family: "Syne", ui-sans-serif, system-ui, sans-serif;
      color: #e8eaec;
      background: #0a0a0c;
    }

    .wrap {
      text-align: center;
    }

    .mark {
      font-size: clamp(2.25rem, 9vw, 3.75rem);
      font-weight: 700;
      letter-spacing: 0.42em;
      margin: 0 0 1.25rem;
      padding-left: 0.42em;
      line-height: 1.05;
      background: linear-gradient(135deg, #f8fafb 0%, #aeb8c0 45%, #d8e0e4 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: markIn 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes markIn {
      from {
        opacity: 0;
        letter-spacing: 0.52em;
        filter: blur(8px);
      }
      to {
        opacity: 1;
        letter-spacing: 0.42em;
        filter: blur(0);
      }
    }

    .soon {
      margin: 0;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(232, 234, 236, 0.38);
      animation: fadeUp 0.85s ease 0.3s both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="mark">PREDIVIO</h1>
    <p class="soon">Coming soon</p>
  </main>
</body>
</html>
